<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}Admin{% endblock %}</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; background: #f4f6f9; color: #222; }
    nav  { background: #1f2937; color: white; padding: 12px 24px; display: flex; justify-content: space-between; }
    nav a { color: #cbd5e1; margin-right: 12px; text-decoration: none; }
    nav a:hover { color: white; }
    .container { max-width: 1100px; margin: 24px auto; padding: 0 24px; }
    h1 { margin-top: 0; }
    table { width: 100%; border-collapse: collapse; background: white; border-radius: 6px; overflow: hidden; }
    th, td { padding: 10px 12px; border-bottom: 1px solid #e5e7eb; text-align: left; }
    th { background: #f9fafb; font-weight: 600; }
    button, input[type=submit] { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; background: #2563eb; color: white; }
    button.danger { background: #dc2626; }
    button.warn   { background: #d97706; }
    .card { background: white; padding: 20px; border-radius: 8px; margin-bottom: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.05); }
    input[type=text], input[type=email], input[type=password] {
      padding: 8px; border: 1px solid #d1d5db; border-radius: 4px; width: 100%;
      box-sizing: border-box; margin-bottom: 8px;
    }
    .flash { padding: 10px; background: #fef3c7; border-left: 4px solid #f59e0b; margin-bottom: 16px; }
    .badge { padding: 2px 8px; border-radius: 12px; font-size: 12px; }
    .ok    { background: #d1fae5; color: #065f46; }
    .ko    { background: #fee2e2; color: #991b1b; }
  </style>
</head>
<body>
  <nav>
    <div><strong>Admin User Management</strong></div>
    <div>
      {% if me %}
        Connecté : <strong>{{ me.preferred_username }}</strong>
        <a href="{{ url_for('logout') }}">Déconnexion</a>
      {% endif %}
    </div>
  </nav>
  <div class="container">
    {% with messages = get_flashed_messages() %}
      {% for m in messages %}<div class="flash">{{ m }}</div>{% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </div>
</body>
</html>
