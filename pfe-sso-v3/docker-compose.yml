services:

  postgres:
    image: postgres:16-alpine
    container_name: pfe-postgres
    environment:
      POSTGRES_USER: pfe
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: pfe_db
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pfe"]
      interval: 5s
      retries: 10
    networks: [pfe-net]

  redis:
    image: redis:7-alpine
    container_name: pfe-redis
    ports: ["6379:6379"]
    networks: [pfe-net]

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: pfe-kafka
    ports: ["9092:9092"]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:29092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092,EXTERNAL://${SERVER_IP}:29092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      retries: 10
    networks: [pfe-net]

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: pfe-kafka-ui
    ports: ["8090:8080"]
    environment:
      KAFKA_CLUSTERS_0_NAME: pfe-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      DYNAMIC_CONFIG_ENABLED: 'true'
    depends_on: [kafka]
    networks: [pfe-net]

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: pfe-keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/pfe_db
      KC_DB_USERNAME: pfe
      KC_DB_PASSWORD: ${DB_PASSWORD}
      KC_DB_SCHEMA: keycloak
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    ports: ["8080:8080"]
    depends_on:
      postgres: { condition: service_healthy }
    networks: [pfe-net]

  api-admin:
    build: ./services/api-admin
    container_name: pfe-api-admin
    volumes:
      - ./shared:/app/shared:ro
    environment:
      SERVICE_NAME: api-admin
      DATABASE_URL: postgresql+asyncpg://pfe:${DB_PASSWORD}@postgres:5432/pfe_db
      REDIS_URL: redis://redis:6379/0
      KAFKA_BROKER: kafka:9092
      OIDC_ISSUER_INTERNAL: http://keycloak:8080/realms/pfe
      OIDC_ISSUER_PUBLIC: http://${SERVER_IP}:8080/realms/pfe
      OIDC_CLIENT_ID: api-admin
      OIDC_CLIENT_SECRET: ${OIDC_ADMIN_SECRET}
      CORS_ORIGINS: 'http://${SERVER_IP}:3001'
    ports: ["8001:8000"]
    depends_on: [keycloak, postgres, redis, kafka]
    networks: [pfe-net]

  api-tickets:
    build: ./services/api-tickets
    container_name: pfe-api-tickets
    volumes:
      - ./shared:/app/shared:ro
    environment:
      SERVICE_NAME: api-tickets
      DATABASE_URL: postgresql+asyncpg://pfe:${DB_PASSWORD}@postgres:5432/pfe_db
      REDIS_URL: redis://redis:6379/0
      KAFKA_BROKER: kafka:9092
      KAFKA_TOPIC_EVENTS: auth.events
      OIDC_ISSUER_INTERNAL: http://keycloak:8080/realms/pfe
      OIDC_ISSUER_PUBLIC: http://${SERVER_IP}:8080/realms/pfe
      OIDC_CLIENT_ID: api-tickets
      OIDC_CLIENT_SECRET: ${OIDC_TICKETS_SECRET}
      CORS_ORIGINS: 'http://${SERVER_IP}:3002'
    ports: ["8002:8000"]
    depends_on: [keycloak, postgres, redis, kafka]
    networks: [pfe-net]

  api-dashboard:
    build: ./services/api-dashboard
    container_name: pfe-api-dashboard
    volumes:
      - ./shared:/app/shared:ro
    environment:
      SERVICE_NAME: api-dashboard
      DATABASE_URL: postgresql+asyncpg://pfe:${DB_PASSWORD}@postgres:5432/pfe_db
      REDIS_URL: redis://redis:6379/0
      KAFKA_BROKER: kafka:9092
      KAFKA_TOPIC_ALERTS: security.alerts
      OIDC_ISSUER_INTERNAL: http://keycloak:8080/realms/pfe
      OIDC_ISSUER_PUBLIC: http://${SERVER_IP}:8080/realms/pfe
      OIDC_CLIENT_ID: api-dashboard
      OIDC_CLIENT_SECRET: ${OIDC_DASHBOARD_SECRET}
      CORS_ORIGINS: 'http://${SERVER_IP}:3003'
    ports: ["8003:8000"]
    depends_on: [keycloak, postgres, redis, kafka]
    networks: [pfe-net]

  event-persister:
    build: ./services/event-persister
    container_name: pfe-event-persister
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://pfe:${DB_PASSWORD}@postgres:5432/pfe_db
      KAFKA_BROKER: kafka:9092
      KAFKA_TOPIC_EVENTS: auth.events
      KAFKA_TOPIC_ALERTS: security.alerts
    depends_on:
      kafka: { condition: service_healthy }
      postgres: { condition: service_healthy }
    networks: [pfe-net]

  keycloak-bridge:
    build: ./services/keycloak-bridge
    container_name: pfe-keycloak-bridge
    restart: unless-stopped
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: pfe
      KEYCLOAK_ADMIN_USER: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KAFKA_BROKER: kafka:9092
      KAFKA_TOPIC_EVENTS: auth.events
      POLL_INTERVAL: "5"
    depends_on:
      keycloak: { condition: service_started }
      kafka:    { condition: service_healthy }
    networks: [pfe-net]

  ml-detector:
    build: ./services/ml-detector
    container_name: pfe-ml-detector
    restart: unless-stopped
    environment:
      KAFKA_BROKER: kafka:9092
      KAFKA_TOPIC_EVENTS: auth.events
      KAFKA_TOPIC_ALERTS: security.alerts
      REDIS_URL: redis://redis:6379/0
      BRUTE_FORCE_THRESHOLD: "10"
      BRUTE_FORCE_WINDOW: "120"
      MULTI_IP_THRESHOLD: "5"
      MULTI_IP_WINDOW: "600"
      ENUM_THRESHOLD: "15"
      ENUM_WINDOW: "300"
      UNUSUAL_HOUR_START: "22"
      UNUSUAL_HOUR_END: "6"
    depends_on:
      kafka: { condition: service_healthy }
    networks: [pfe-net]

  frontend-admin:
    build:
      context: ./frontend/admin
      args:
        VITE_API_URL: http://${SERVER_IP}:8001
        VITE_KEYCLOAK_URL: http://${SERVER_IP}:8080
        VITE_KEYCLOAK_CLIENT: spa-admin
    container_name: pfe-frontend-admin
    ports: ["3001:80"]
    networks: [pfe-net]

  frontend-tickets:
    build:
      context: ./frontend/tickets
      args:
        VITE_API_URL: http://${SERVER_IP}:8002
        VITE_KEYCLOAK_URL: http://${SERVER_IP}:8080
        VITE_KEYCLOAK_CLIENT: spa-tickets
    container_name: pfe-frontend-tickets
    ports: ["3002:80"]
    networks: [pfe-net]

  frontend-dashboard:
    build:
      context: ./frontend/dashboard
      args:
        VITE_API_URL: http://${SERVER_IP}:8003
        VITE_KEYCLOAK_URL: http://${SERVER_IP}:8080
        VITE_KEYCLOAK_CLIENT: spa-dashboard
    container_name: pfe-frontend-dashboard
    ports: ["3003:80"]
    networks: [pfe-net]

volumes:
  pg_data:

networks:
  pfe-net:
    driver: bridge
