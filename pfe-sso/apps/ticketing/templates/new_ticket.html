{% extends "base.html" %}
{% block content %}
<div class="card"><div class="card-body">
        <h4>📝 Nouveau Ticket</h4>
        <form method="POST">
            <div class="mb-3"><label class="form-label">Titre *</label><input type="text" name="title" class="form-control" required placeholder="Décrivez brièvement le problème"></div>
            <div class="mb-3"><label class="form-label">Description</label><textarea name="description" class="form-control" rows="5" placeholder="Détails du problème…"></textarea></div>
            <div class="mb-3"><label class="form-label">Priorité</label><select name="priority" class="form-select"><option value="low">Basse</option><option value="medium" selected>Moyenne</option><option value="high">Haute</option></select></div>
            <button type="submit" class="btn btn-primary">Créer le ticket</button> <a href="/" class="btn btn-secondary">Annuler</a>
        </form>
</div></div>
{% endblock %}
