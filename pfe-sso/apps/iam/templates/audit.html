{% extends "base.html" %}
{% block content %}
<div class="card"><div class="card-body">
        <h4>📝 Journal d'Audit</h4>
        <p class="text-muted">Accessible uniquement au rôle <span class="badge bg-danger">admin</span>.</p>
        <table class="table table-striped table-sm"><thead><tr><th>Date</th><th>Utilisateur</th><th>Action</th></tr></thead><tbody>
                {% for log in logs %}<tr><td>{{ log.timestamp.strftime('%d/%m/%Y %H:%M:%S') if log.timestamp else '-' }}</td><td>{{ log.username }}</td><td><span class="badge bg-secondary">{{ log.action }}</span></td></tr>{% endfor %}
        </tbody></table>
</div></div>
{% endblock %}
